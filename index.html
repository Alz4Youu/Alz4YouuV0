<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALZ4YOUU MEGA-DASHBOARD</title>
    <style>
        /* Gaya Dasar - Dark & Cyber */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Visual */
        .header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(180deg, #111 0%, #050505 100%);
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .header p {
            color: #666;
            font-size: 0.8rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Sistem Grid Menu (Bisa sampai 200 menu) */
        .container {
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* Kotak Menu/Tool */
        .card {
            background: #0f0f0f;
            border: 1px solid #222;
            padding: 25px 10px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: #eee;
            transition: 0.2s;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Efek saat ditekan di HP */
        .card:active {
            background: #1a1a1a;
            transform: scale(0.92);
            border-color: #444;
        }

        /* Footer VIP */
        .footer {
            text-align: center;
            padding: 40px;
            color: #333;
            font-size: 0.6rem;
            letter-spacing: 3px;
        }
    </style>
</head>

    </div>
